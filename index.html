<html>
<head>
<meta charset="utf-8">
<title>PSFree | 9.00</title>

<script src="./bundle.js"></script>

<style>
body {
    background-color: #063FAB;
    color: white;
    font-size: 28px;
    text-align: center;
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#console {
    display: none !important;
}

.content {
    position: relative;
    top: 20%;
}

#jailbreakBtn {
    margin-top: 40px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    transition: 0.2s;
}

#jailbreakBtn:not(:disabled):hover {
    background: rgba(255,255,255,0.2);
}

#jailbreakBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.ps-logo {
    width: 70px;
}

#autoRunText {
    margin-top: 20px;
    font-size: 18px;
}

footer {
    margin-top: 30px;
    font-size: 14px;
    color: #ccc;
}
</style>

<script>
if ((window.applicationCache.status == '0') || (window.applicationCache.status == '3')) {
    window.location.replace("cache.html");
}
</script>
</head>

<body>

<pre id="console"></pre>

<div class="content">

    <button id="jailbreakBtn">
        <svg class="ps-logo" xmlns="http://www.w3.org/2000/svg" viewBox="4.3 9.5 41.1 31">
            <path d="M5.8 32.1c-1.5 1-1 2.9 2.2 3.8 3.3 1.1 6.9 1.4 10.4.8.2 0 .4-.1.5-.1v-3.4l-3.4 1.1c-1.3.4-2.6.5-3.9.2-1-.3-.8-.9.4-1.4l6.9-2.4V27l-9.6 3.3c-1.2.4-2.4 1-3.5 1.8zm23.2-15v9.7c4.1 2 7.3 0 7.3-5.2 0-5.3-1.9-7.7-7.4-9.6C26 11 23 10.1 20 9.5v28.9l7 2.1V16.2c0-1.1 0-1.9.8-1.6 1.1.3 1.2 1.4 1.2 2.5zm13 12.7c-2.9-1-6-1.4-9-1.1-1.6.1-3.1.5-4.5 1l-.3.1v3.9l6.5-2.4c1.3-.4 2.6-.5 3.9-.2 1 .3.8.9-.4 1.4l-10 3.7V40L42 34.9c1-.4 1.9-.9 2.7-1.7.7-1 .4-2.4-2.7-3.4z" fill="white"/>
        </svg>
    </button>

    <div id="autoRunText">
        Autorun en <span id="countdown">5</span> segundos
    </div>

    <div id="estadoXploit">Esperando acción...</div>
    <div id="fwInfo" style="font-size:18px; margin-top:10px;"></div>

    <input type="checkbox" id="autoRunCheck" checked hidden>

    <footer>PSFree Loader</footer>

</div>

<script>
// ================= VARIABLES =================
var countdownValue = 5;
var countdownTimer = null;

var countdownSpan = document.getElementById('countdown');
var jailbreakBtn = document.getElementById('jailbreakBtn');

// ================= FUNCIONES UI =================
function setEstado(msg){
    document.getElementById("estadoXploit").innerHTML = msg;
}

function setFW(msg){
    document.getElementById("fwInfo").innerHTML = msg;
}

// ================= BOTÓN =================
jailbreakBtn.addEventListener("click", () => {

    setEstado("Ejecutando exploit...");

    jailbreakBtn.disabled = true;
    countdownSpan.textContent = "-";

    if (countdownTimer) clearInterval(countdownTimer);

    try {
        doJBwithPSFreeLapseExploit();
    } catch (error) {
        setEstado("Error al ejecutar exploit ❌");
    }
});

// ================= COUNTDOWN =================
function restartCountdown() {
    countdownValue = 5;
    countdownSpan.textContent = countdownValue;

    countdownTimer = setInterval(() => {

        countdownValue--;
        countdownSpan.textContent = countdownValue;

        if (countdownValue <= 0) {
            clearInterval(countdownTimer);
            jailbreakBtn.click();
        }

    }, 1000);
}

// ================= LOAD PRINCIPAL =================
window.addEventListener('load', function(){

    // iniciar contador
    restartCountdown();

    // detectar firmware manualmente
    try {
        if (typeof checkPlatformIsSupported === "function") {
            checkPlatformIsSupported();
        }
    } catch(e){}

    // interceptar logs del exploit
    window.log = function(msg){

        if (!msg) return;

        // Firmware
        if (msg.includes("Detected FW")) {
            let match = msg.match(/PS(\d) v([\d.]+)/);
            if (match) {
                setFW("PS" + match[1] + " Firmware " + match[2]);
            }
            return;
        }

        // Ya jailbroken
        if (msg.includes("Already jailbroken")) {
            setEstado("Exploit ya activo ✔");
            return;
        }

        // BinLoader listo
        if (msg.includes("BinLoader")) {
            setEstado("Exploit activado ✔ Esperando payload (9020)...");
            return;
        }

    };

    log = window.log;

});
</script>

</body>
</html>
