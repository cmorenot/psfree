<div class="content">

    <!-- BOTÓN -->

<script>
// ================= VARIABLES =================
var countdownValue = 5;
var countdownTimer = null;

var jailbreakBtn = document.getElementById('jailbreakBtn');

// ================= FUNCIONES =================
function setEstado(msg){
    document.getElementById("estadoXploit").innerHTML = msg;
}

function setFW(msg){
    document.getElementById("fwInfo").innerHTML = msg;
}

// ================= DETECTAR FW =================
function detectarFWdirecto() {
    var ua = navigator.userAgent;
    var match = ua.match(/PlayStation (\d)[ \/]([\d.]+)/);

    if (match) {
        setFW("PS" + match[1] + " Firmware " + match[2]);
    } else {
        setFW("Dispositivo no detectado");
    }
}

// ================= BOTÓN =================
jailbreakBtn.addEventListener("click", () => {

    setEstado("Ejecutando exploit...");

    jailbreakBtn.disabled = true;

    if (countdownTimer) clearInterval(countdownTimer);

    try {
        doJBwithPSFreeLapseExploit();
    } catch (error) {
        setEstado("Error al ejecutar exploit ❌");
    }
});

// ================= COUNTDOWN =================
function restartCountdown() {

    countdownValue = 5;
    setEstado("Ejecución automática en " + countdownValue + " segundos");

    countdownTimer = setInterval(() => {

        countdownValue--;

        setEstado("Ejecución automática en " + countdownValue + " segundos");

        if (countdownValue <= 0) {
            clearInterval(countdownTimer);
            jailbreakBtn.click();
        }

    }, 1000);
}

// ================= ERRORES =================
window.onerror = function(){
    setEstado("Error crítico ❌ Reinicie la consola");
    return true;
};

window.onunhandledrejection = function(){
    setEstado("Error crítico ❌ Reinicie la consola");
};

// ================= LOAD =================
window.addEventListener('load', function(){

    detectarFWdirecto();
    restartCountdown();

    window.log = function(msg){

        if (!msg) return;

        // 🔴 ERRORES
        if (
            msg.includes("failed") ||
            msg.includes("error") ||
            msg.includes("Error") ||
            msg.includes("not properly initialized")
        ) {
            setEstado("Error al ejecutar exploit ❌ Reinicie la consola");
            return;
        }

        // 🟢 TU MENSAJE REAL
        if (msg.includes("Kernel exploit succeeded")) {
            setEstado("Kernel exploit activado ✔ Puede enviar payload (9020)");
            jailbreakBtn.style.background = "rgba(0,255,0,0.2)";
            return;
        }

        // 🟡 YA ACTIVO
        if (msg.includes("Already jailbroken")) {
            setEstado("Exploit ya activo ✔ Puede enviar payload (9020)");
            return;
        }
    };

    log = window.log;

    // 🔥 LOGS TEMPRANOS
    if (window._earlyLogs) {
        window._earlyLogs.forEach(msg => log(msg));
        window._earlyLogs = [];
    }
});
</script>
